name: Terraform AWS Hardcoded Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS
        run: |
          aws configure set aws_access_key_id AKIAWNOOBLJYPVTTX7HV
          aws configure set aws_secret_access_key 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
          aws configure set default.region us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Init Upgrade
        run: terraform init -upgrade -input=false

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
